AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Business Data Portal CRUD API

Parameters:
  AppEnv:
    Type: String
    AllowedValues:
      - DEV
      - STAGING
      - PROD
    Default: DEV
  CognitoUserPoolId:
    Type: String
    NoEcho: false
  CognitoClientId:
    Type: String
    NoEcho: false
  AllowedOrigins:
    Type: String
    Default: ''
  AccountsTableName:
    Type: String
    Default: Accounts
  ContactsTableName:
    Type: String
    Default: Contacts
  SubscriptionsTableName:
    Type: String
    Default: Subscriptions
  CloudFilesTableName:
    Type: String
    Default: CloudFiles
  DeleteMode:
    Type: String
    AllowedValues:
      - hard
      - soft
    Default: hard

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    MemorySize: 256
    Timeout: 10
    Tracing: Disabled
    Environment:
      Variables:
        APP_ENV: !Ref AppEnv
        DEV_AUTH_BYPASS: 'false'
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref CognitoClientId
        ALLOWED_ORIGINS: !Ref AllowedOrigins
        ACCOUNTS_TABLE: !Ref AccountsTableName
        CONTACTS_TABLE: !Ref ContactsTableName
        SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTableName
        CLOUD_FILES_TABLE: !Ref CloudFilesTableName
        DEFAULT_PAGE_SIZE: '25'
        MAX_PAGE_SIZE: '100'
        DELETE_MODE: !Ref DeleteMode

Resources:
  CrudApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}
              audience:
                - !Ref CognitoClientId
            IdentitySource: '$request.header.Authorization'
        DefaultAuthorizer: CognitoAuthorizer
      CorsConfiguration:
        AllowOrigins:
          - "https://di58r81ejzy3.cloudfront.net"
          - "http://localhost:5173"
        AllowHeaders:
          - authorization
          - content-type
          - x-request-id
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  CrudApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub business-data-portal-crud-${AppEnv}
      CodeUri: .
      Handler: dist/src/lambda.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccountsTableName}
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccountsTableName}/index/*
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ContactsTableName}
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ContactsTableName}/index/*
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SubscriptionsTableName}
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SubscriptionsTableName}/index/*
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CloudFilesTableName}
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CloudFilesTableName}/index/*
      Events:
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref CrudApi
            Path: /{proxy+}
            Method: GET
        ProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref CrudApi
            Path: /{proxy+}
            Method: POST
        ProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref CrudApi
            Path: /{proxy+}
            Method: PUT
        ProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref CrudApi
            Path: /{proxy+}
            Method: DELETE
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref CrudApi
            Path: /
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - src/lambda.ts

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint
    Value: !Sub https://${CrudApi}.execute-api.${AWS::Region}.amazonaws.com
